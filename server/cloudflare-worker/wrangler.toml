name = "task-planner-sync-api"
main = "worker.js"
compatibility_date = "2026-05-23"

# После создания D1 базы замените database_id.
[[d1_databases]]
binding = "DB"
database_name = "task_planner_sync"
database_id = "PASTE_D1_DATABASE_ID"

# BOT_TOKEN задаётся командой:
# wrangler secret put BOT_TOKEN
